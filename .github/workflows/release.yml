name: Release

'on':
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"

          if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${tag_name}"
            echo "Expected semantic version format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Validate tag is contained in main
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          tag_commit="$(git rev-list -n 1 "${tag_name}")"

          git fetch --no-tags origin main

          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Tag ${tag_name} points to ${tag_commit}, which is not contained in origin/main."
            echo "Create releases only from commits that have already landed on main."
            exit 1
          fi

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          release_note_file="docs/releases/${tag_name}.md"
          changelog_file=""
          validation_report=""

          if [[ "${tag_name}" =~ ^v0\.([0-9]+)\.[0-9]+$ ]]; then
            phase="${BASH_REMATCH[1]}"

            for candidate in \
              "docs/architecture/CHANGELOG_FASE_${phase}.md" \
              "docs/operations/CHANGELOG_FASE_${phase}.md" \
              "docs/operations/CHANGELOG_FASE_${phase}C.md"
            do
              if [[ -f "${candidate}" ]]; then
                changelog_file="${candidate}"
                break
              fi
            done

            for candidate in \
              "docs/operations/PHASE_${phase}B_LOCAL_VALIDATION_REPORT.md" \
              "docs/operations/PHASE_${phase}C_VALIDATION_REPORT.md"
            do
              if [[ -f "${candidate}" ]]; then
                validation_report="${candidate}"
                break
              fi
            done
          fi

          if [[ -z "${changelog_file}" && -f "CHANGELOG.md" ]]; then
            changelog_file="CHANGELOG.md"
          fi

          if [[ -f "${release_note_file}" ]]; then
            cp "${release_note_file}" release-notes.md
            echo "manual_notes=true" >> "${GITHUB_ENV}"
          else
            {
              echo "## Technical documentation"
              echo

              if [[ -n "${changelog_file}" ]]; then
                echo "- Technical changelog: \`${changelog_file}\`"
              else
                echo "- Technical changelog: not found for this tag."
              fi

              if [[ -n "${validation_report}" ]]; then
                echo "- Validation report: \`${validation_report}\`"
              fi
            } > release-notes.md
            echo "manual_notes=false" >> "${GITHUB_ENV}"
          fi

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          prerelease_flag=()
          latest_flag=()

          if [[ "${tag_name}" =~ ^v0\. ]]; then
            prerelease_flag+=(--prerelease)
            latest_flag+=(--latest=false)
          fi

          generate_notes_flag=(--generate-notes)
          release_notes_arg=(--notes "$(cat release-notes.md)")

          if [[ "${manual_notes}" == "true" ]]; then
            generate_notes_flag=()
            release_notes_arg=(--notes-file release-notes.md)
          fi

          gh release create "${tag_name}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${tag_name}" \
            "${release_notes_arg[@]}" \
            "${generate_notes_flag[@]}" \
            "${prerelease_flag[@]}" \
            "${latest_flag[@]}"
