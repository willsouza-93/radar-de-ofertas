name: Release

'on':
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"

          if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${tag_name}"
            echo "Expected semantic version format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Prepare release notes prefix
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          changelog_file=""

          if [[ "${tag_name}" =~ ^v0\.([0-9]+)\.[0-9]+$ ]]; then
            phase="${BASH_REMATCH[1]}"

            for candidate in \
              "docs/architecture/CHANGELOG_FASE_${phase}.md" \
              "docs/operations/CHANGELOG_FASE_${phase}.md" \
              "docs/operations/CHANGELOG_FASE_${phase}C.md"
            do
              if [[ -f "${candidate}" ]]; then
                changelog_file="${candidate}"
                break
              fi
            done
          fi

          if [[ -z "${changelog_file}" && -f "CHANGELOG.md" ]]; then
            changelog_file="CHANGELOG.md"
          fi

          {
            echo "## Project changelog context"
            echo

            if [[ -n "${changelog_file}" ]]; then
              echo "Source: \`${changelog_file}\`"
              echo
              sed -n '1,220p' "${changelog_file}"
            else
              echo "No project changelog file was found for this tag."
            fi
          } > release-notes-prefix.md

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          prerelease_flag=()
          latest_flag=()

          if [[ "${tag_name}" =~ ^v0\. ]]; then
            prerelease_flag+=(--prerelease)
            latest_flag+=(--latest=false)
          fi

          release_notes="$(cat release-notes-prefix.md)"

          gh release create "${tag_name}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --title "${tag_name}" \
            --notes "${release_notes}" \
            "${prerelease_flag[@]}" \
            "${latest_flag[@]}"
