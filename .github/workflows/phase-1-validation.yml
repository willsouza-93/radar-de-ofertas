name: Phase 1 Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/phase-1c-provisioning

permissions:
  contents: read

jobs:
  supabase-rls:
    name: Supabase migrations and RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase database only
        run: |
          npx supabase start \
            -x edge-runtime,gotrue,imgproxy,kong,logflare,mailpit,postgres-meta,postgrest,realtime,storage-api,studio,supavisor,vector

      - name: Reset database
        run: npx supabase db reset

      - name: Run database tests
        run: npx supabase test db

